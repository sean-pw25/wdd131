<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>United States of America</title>
    <meta name="description"
        content="Information and facts about the United States of America, the country where Sean Wood currently resides.">
    <meta name="author" content="Sean Wood">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Gelasio:wght@600&display=swap"
        rel="stylesheet">
    <script src="scripts/place.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>

<body>
    <header>
        <h1>United States of America</h1>
    </header>
    <main>
        <picture>
            <source srcset="images/place/hero-large.webp" media="(min-width: 1000px)">
            <source srcset="images/place/hero-medium.webp" media="(min-width: 500px)">
            <img src="images/place/hero-small.webp" alt="Flag of the United States of America">
        </picture>
        <section class="data">
            <h2>Data</h2>
            <dl>
                <dt>Area:</dt>
                <dd>3,796,742 sq mi</dd>

                <dt>Population:</dt>
                <dd>341,784,857</dd>

                <dt>Capital:</dt>
                <dd>Washington D.C.</dd>

                <dt>Languages:</dt>
                <dd>English, Spanish</dd>

                <dt>Currency:</dt>
                <dd>USD</dd>

                <dt>Calling Code:</dt>
                <dd>+1</dd>

                <dt>Internet TLD:</dt>
                <dd>.us</dd>
            </dl>
        </section>
        <section class="weather">
            <h2>Weather</h2>
            <img id="weather-img" src="images/place/weather.svg" alt="weather icon">
            <dl>
                <dt>Temperature:</dt>
                <dd>48 °F</dd>

                <dt>Conditions:</dt>
                <dd>Partly Cloudy</dd>

                <dt>Wind:</dt>
                <dd>14 mph</dd>

                <dt>Wind Chill:</dt>
                <dd id="wind-chill">N/A</dd>
            </dl>
        </section>
    </main>
    <footer>
        <p class="roboto-regular">&copy; <span id="currentYear"></span> | Sean Wood | USA</p>
        <p class="roboto-regular" id="lastModified"></p>
    </footer>
</body>

</html>
